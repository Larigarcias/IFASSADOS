<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>IF Assados – Escolha sua unidade</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --black:   #0f0f0f;
      --white:   #f5f2ee;
      --red:     #8b1a1a;
      --orange:  #c45e1a;
      --gray:    #2a2a2a;
      --muted:   #888;
    }
    html, body {
      min-height: 100vh;
      background: var(--black);
      color: var(--white);
      font-family: 'Inter', sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem 1.25rem;
    }
    .logo-img {
      width: 400px;
      height: auto;
      margin-bottom: 1.5rem;
      
    }
    .ember {
      width: 48px;
      height: 3px;
      background: linear-gradient(90deg, var(--red), var(--orange));
      border-radius: 2px;
      margin: 0 auto 2rem;
      animation: pulse 2.4s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: .5; transform: scaleX(.85); }
      50%       { opacity: 1;  transform: scaleX(1);   }
    }
    .question {
      margin-top: 1.5rem;
      font-size: clamp(1rem, 3.5vw, 1.2rem);
      font-weight: 500;
      text-align: center;
      color: var(--white);
      line-height: 1.5;
    }
    .cards {
      margin-top: 1.75rem;
      display: flex;
      flex-direction: column;
      gap: 1rem;
      width: 100%;
      max-width: 400px;
    }
    .card {
      display: flex;
      flex-direction: column;
      gap: .35rem;
      background: var(--gray);
      border: 1px solid #333;
      border-radius: 12px;
      padding: 1.4rem 1.5rem;
      cursor: pointer;
      text-decoration: none;
      color: var(--white);
      transition: border-color .2s, transform .15s, background .2s;
      position: relative;
      overflow: hidden;
    }
    .card::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, var(--red) 0%, transparent 60%);
      opacity: 0;
      transition: opacity .25s;
    }
    .card:hover { border-color: var(--orange); transform: translateY(-2px); background: #333; }
    .card:hover::before { opacity: .08; }
    .card-neighborhood {
      font-family: 'Playfair Display', serif;
      font-size: 1.35rem;
      font-weight: 700;
      position: relative;
    }
    .card-label {
      font-size: .78rem;
      color: var(--muted);
      letter-spacing: .06em;
      text-transform: uppercase;
      position: relative;
    }
    .card-action {
      margin-top: .9rem;
      display: inline-flex;
      align-items: center;
      gap: .4rem;
      font-size: .82rem;
      font-weight: 600;
      color: var(--orange);
      position: relative;
    }
    .card-action svg { width: 14px; height: 14px; }
    .notice {
      margin-top: 2.5rem;
      font-size: .72rem;
      color: #555;
      text-align: center;
      max-width: 320px;
      line-height: 1.6;
    }
    .divider {
      width: 32px;
      height: 1px;
      background: #333;
      margin: 2.5rem auto 0;
    }
    .footer {
      margin-top: 1rem;
      font-size: .7rem;
      color: #444;
      text-align: center;
    }
    @media (min-width: 480px) {
      .cards { flex-direction: row; max-width: 520px; }
      .card  { flex: 1; }
    }
  </style>
</head>
